<!doctype html>
<html lang="en" class="">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" href="./images/favicon-32x32.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Open+Sans:wdth,wght@75..100,300..800&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./css/styles.css" />

        <script defer src="./js/script.js"></script>

        <title>Fylo</title>
    </head>
    <body
        class="font-opensans background body-background text-darkBlue2 dark:text-white"
    >
        <header class="mb-20">
            <div
                class="flex flex-col md:flex-row items-center justify-center gap-6 md:gap-0 md:justify-between p-8 text-center"
            >
                <div class="background logo-background logo"></div>
                <div class="flex flex-row gap-4 items-center justify-center">
                    <nav aria-label="main navigation">
                        <ul
                            class="flex flex-row gap-6 items-center justify-center md:text-xl lg:text-2xl"
                        >
                            <li><a href="#" class="hover-link">features</a></li>
                            <li>
                                <a href="#" class="hover-link">testimonials</a>
                            </li>
                        </ul>
                    </nav>
                    <button
                        id="theme-toggle"
                        aria-label="toggle color theme"
                        class="p-1 inline-block cursor-pointer text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            id="theme-toggle-light-icon"
                            class="hidden icon-small text-white"
                            viewBox="0 0 512 512"
                        >
                            <path
                                fill="none"
                                stroke="currentColor"
                                stroke-linecap="round"
                                stroke-miterlimit="10"
                                stroke-width="32"
                                d="M256 48v48M256 416v48M403.08 108.92l-33.94 33.94M142.86 369.14l-33.94 33.94M464 256h-48M96 256H48M403.08 403.08l-33.94-33.94M142.86 142.86l-33.94-33.94"
                            />
                            <circle
                                cx="256"
                                cy="256"
                                r="80"
                                fill="none"
                                stroke="currentColor"
                                stroke-linecap="round"
                                stroke-miterlimit="10"
                                stroke-width="32"
                            />
                        </svg>
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            id="theme-toggle-dark-icon"
                            class="hidden icon-small text-darkBlue2"
                            viewBox="0 0 512 512"
                        >
                            <path
                                d="M160 136c0-30.62 4.51-61.61 16-88C99.57 81.27 48 159.32 48 248c0 119.29 96.71 216 216 216 88.68 0 166.73-51.57 200-128-26.39 11.49-57.38 16-88 16-119.29 0-216-96.71-216-216z"
                                fill="none"
                                stroke="currentColor"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="32"
                            />
                        </svg>
                    </button>
                </div>
            </div>
        </header>
        <main>
            
        </main>
        <footer></footer>
    </body>
</html>
